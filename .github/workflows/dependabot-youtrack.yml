name: Dependabot alerts -> YouTrack (grouped, dedup, priority)

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create grouped YouTrack issues for Dependabot alerts
        env:
          GH_DEPENDABOT_TOKEN: ${{ secrets.GH_TOKEN }}
          YT_BASE_URL: ${{ secrets.YT_BASE_URL }}
          YT_KOTLIN_SUPPORT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_KT_PROJECT_SHORTNAME: ${{ secrets.YT_PROJECT_SHORTNAME }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          YT_BASE_URL="${YT_BASE_URL%/}"
          SINCE="$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")"
          urlenc() { jq -nr --arg s "$1" '$s|@uri'; }

          alerts="$(
            curl -sS \
              -H "Authorization: Bearer ${GH_DEPENDABOT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/dependabot/alerts?state=open&per_page=100"
          )"

          # 20 newest + changed in last 24h -> group by package+summary
          echo "$alerts" | jq -c '
            (if type=="array" then . else [] end)
            | map(select(type=="object"))
            | sort_by(.updated_at // .created_at) | reverse
            | .[:20]
            | map(select((.created_at >= env.SINCE) or (.updated_at >= env.SINCE)))
            | sort_by(.dependency.package.name, .security_advisory.summary)
            | group_by(.dependency.package.name + "|" + .security_advisory.summary)
            | .[]
          ' | while read -r group; do

            # Skip alerts already present in YouTrack (per-alert marker in description)
            kept='[]'
            while read -r a; do
              num="$(echo "$a" | jq -r '.number')"
              marker="dependabot-alert:${REPO}#${num}"
              q="$(urlenc "project: ${YT_KT_PROJECT_SHORTNAME} # {${marker}}")"
              existing="$(
                curl -sS \
                  --http1.1 \
                  -H "Expect:" \
                  -H "Authorization: Bearer ${YT_KOTLIN_SUPPORT_TOKEN}" \
                  -H "Accept: application/json" \
                  "${YT_BASE_URL}/api/issues?fields=idReadable&query=${q}"
              )"
              if [ "$(echo "$existing" | jq length)" -gt 0 ]; then
                echo "Skip existing alert #$num"
              else
                kept="$(jq -c --argjson a "$a" '. + [$a]' <<<"$kept")"
              fi
            done < <(echo "$group" | jq -c '.[]')

            if [ "$(echo "$kept" | jq length)" -eq 0 ]; then
              echo "All alerts in group already exist, skipping group"
              continue
            fi

            numbers="$(echo "$kept" | jq -r 'map(.number) | sort | map("#"+tostring) | join(" ")')"
            title="$(echo "$kept" | jq -r '.[0].security_advisory.summary // (.[0].dependency.package.name // "unknown")')"
            severity="$(echo "$kept" | jq -r '.[0].security_advisory.severity // "unknown"')"

            priority="$(
              case "$(echo "$severity" | tr '[:lower:]' '[:upper:]')" in
                CRITICAL) echo "Critical" ;;
                HIGH)     echo "High" ;;
                MODERATE) echo "Medium" ;;
                LOW)      echo "Low" ;;
                *)        echo "Medium" ;;
              esac
            )"

            summary="[Dependabot] ${numbers} ${title}"

            alerts_block="$(echo "$kept" | jq -r --arg repo "$REPO" '
              .[]
              | ("dependabot-alert:" + $repo + "#" + (.number|tostring)) as $m
              | "Alert: \(.html_url)\n"
                + "File: \(.dependency.manifest_path // \"unknown\")\n"
                + "Affected versions: \(.security_vulnerability.vulnerable_version_range // \"unknown\")\n"
                + "Patched version: \(.security_vulnerability.first_patched_version.identifier // \"unknown\")\n"
                + "\n"
                + $m
                + "\n\n"
            ')"

            payload="$(jq -n \
              --arg proj "$YT_KT_PROJECT_SHORTNAME" \
              --arg summary "$summary" \
              --arg desc ("Severity: " + $severity + "\nPriority: " + $priority + "\n\n" + $alerts_block + "Generated by GitHub Actions") \
              --arg priority "$priority" \
              '{
                project: { shortName: $proj },
                summary: $summary,
                description: $desc,
                customFields: [
                  { name: "Type", "$type": "SingleEnumIssueCustomField", value: { name: "Task" } },
                  { name: "Priority", "$type": "SingleEnumIssueCustomField", value: { name: $priority } }
                ]
              }'
            )"

            tmp="$(mktemp)"
            printf '%s' "$payload" > "$tmp"

            curl -sS \
              --http1.1 \
              -H "Expect:" \
              -H "Authorization: Bearer ${YT_KOTLIN_SUPPORT_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              --data-binary @"$tmp" \
              "${YT_BASE_URL}/api/issues?fields=idReadable,id,summary" \
              | jq -r '"Created: " + (.idReadable // .id // "unknown") + " — " + (.summary // "")'

            rm -f "$tmp"
          done
