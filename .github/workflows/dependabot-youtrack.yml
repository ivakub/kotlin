name: Dependabot alerts -> YouTrack

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create YouTrack issue for first Dependabot alert
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          YT_BASE_URL: ${{ secrets.YT_BASE_URL }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_PROJECT: ${{ secrets.YT_PROJECT_SHORTNAME }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          YT_BASE_URL="${YT_BASE_URL%/}"
          SINCE="$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")"

          alerts="$(
            curl -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/dependabot/alerts?state=open&per_page=100"
          )"

          new_alerts="$(echo "$alerts" | jq --arg since "$SINCE" '
            map(select((.created_at >= $since) or (.updated_at >= $since)))
          ')"

          alert="$(echo "$new_alerts" | jq -c '.[0]')"

          if [ "$alert" = "null" ]; then
            echo "No alerts found"
            exit 0
          fi

          number="$(echo "$alert" | jq -r '.number')"
          pkg="$(echo "$alert" | jq -r '.dependency.package.name // "unknown"')"
          manifest="$(echo "$alert" | jq -r '.dependency.manifest_path // ""')"
          severity="$(echo "$alert" | jq -r '.security_advisory.severity // "unknown"')"
          summary="$(echo "$alert" | jq -r '.security_advisory.summary // ""')"
          description="$(echo "$alert" | jq -r '.security_advisory.description // ""')"
          url="$(echo "$alert" | jq -r '.html_url')"

          title="$summary"
          [[ -n "$title" ]] || title="$pkg"

          marker="dependabot-alert:${REPO}#${number}"

          payload="$(jq -n \
            --arg proj "$YT_PROJECT" \
            --arg marker "$marker" \
            --arg url "$url" \
            --arg pkg "$pkg" \
            --arg manifest "$manifest" \
            --arg severity "$severity" \
            --arg title "$title" \
            --arg desc "$description" \
            '{
              project: { shortName: $proj },
              summary: ("Dependabot alert: " + $title + " (" + $severity + ")"),
              description:
                ($marker +
                "\n\n" + $desc +
                "\n\nAlert: " + $url +
                "\nPackage: " + $pkg +
                (if $manifest != "" then "\nManifest: " + $manifest else "" end) +
                "\nSeverity: " + $severity +
                "\n\nGenerated by GitHub Actions"),
              customFields: [
                {
                  name: "Type",
                  "$type": "SingleEnumIssueCustomField",
                  value: { name: "Task" }
                }
              ]
            }'
          )"

          payload_file="$(mktemp)"
          printf '%s' "$payload" > "$payload_file"

          response="$(
            curl -sS \
              --http1.1 \
              -H "Expect:" \
              -X POST \
              -H "Authorization: Bearer ${YT_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              --data-binary @"$payload_file" \
              "${YT_BASE_URL}/api/issues?fields=idReadable,id,summary"
          )"

          id="$(echo "$response" | jq -r '.idReadable // .id // empty')"
          summary_out="$(echo "$response" | jq -r '.summary // empty')"

          if [ -z "$id" ]; then
            echo "YouTrack response:"
            echo "$response"
            exit 1
          fi

          echo "Created: $id — $summary_out"

          rm -f "$payload_file"
