name: Dependabot alerts -> YouTrack (grouped, priority)

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create grouped YouTrack issues for Dependabot alerts
        env:
          GH_DEPENDABOT_TOKEN: ${{ secrets.GH_TOKEN }}
          YT_BASE_URL: ${{ secrets.YT_BASE_URL }}
          YT_KOTLIN_SUPPORT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_KT_PROJECT_SHORTNAME: ${{ secrets.YT_PROJECT_SHORTNAME }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          YT_BASE_URL="${YT_BASE_URL%/}"
          SINCE="$(date -u -d '48 hours ago' +"%Y-%m-%dT%H:%M:%SZ")"

          alerts="$(
            curl -sS \
              -H "Authorization: Bearer ${GH_DEPENDABOT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/dependabot/alerts?state=open&per_page=100"
          )"

          echo "$alerts" | jq -c --arg since "$SINCE" '
            (if type == "array" then . else [] end)
            | map(select(type == "object"))
            | sort_by(.updated_at // .created_at)
            | reverse
            | .[:20]
            | map(select((.created_at >= $since) or (.updated_at >= $since)))
            | sort_by(.dependency.package.name, .security_advisory.summary)
            | group_by(.dependency.package.name + "|" + .security_advisory.summary)
            | .[]
            | {
                numbers: (map(.number) | sort),
                title: (.[0].security_advisory.summary // (.[0].dependency.package.name // "unknown")),
                severity: (.[0].security_advisory.severity // "unknown"),
                items: map({
                  url: .html_url,
                  file: (.dependency.manifest_path // "unknown"),
                  affected: (.security_vulnerability.vulnerable_version_range // "unknown"),
                  patched: (.security_vulnerability.first_patched_version.identifier // "unknown")
                })
              }
          ' | while read -r group; do
            numbers="$(echo "$group" | jq -r '.numbers | map("#"+tostring) | join(" ")')"
            title="$(echo "$group" | jq -r '.title')"
            severity="$(echo "$group" | jq -r '.severity')"

            priority="$(
              case "$(echo "$severity" | tr '[:lower:]' '[:upper:]')" in
                CRITICAL) echo "Critical" ;;
                HIGH) echo "Major" ;;
                MODERATE) echo "Normal" ;;
                LOW) echo "Minor" ;;
                *) echo "Normal" ;;
              esac
            )"

            summary="[Dependabot] ${numbers} ${title}"

            alerts_block="$(echo "$group" | jq -r '
              .items[]
              | "Alert: \(.url)\n"
                + "File: \(.file)\n"
                + "Affected versions: \(.affected)\n"
                + "Patched version: \(.patched)\n\n"
            ')"

            payload="$(jq -n \
              --arg proj "$YT_KT_PROJECT_SHORTNAME" \
              --arg summary "$summary" \
              --arg desc ("${alerts_block}\nGenerated by GitHub Actions") \
              --arg priority "$priority" \
              '{
                project: { shortName: $proj },
                summary: $summary,
                description: $desc,
                customFields: [
                  {
                    name: "Type",
                    "$type": "SingleEnumIssueCustomField",
                    value: { name: "Task" }
                  },
                  {
                    name: "Priority",
                    "$type": "SingleEnumIssueCustomField",
                    value: { name: $priority }
                  }
                ]
              }'
            )"

            tmp_payload="$(mktemp)"
            tmp_resp="$(mktemp)"
            printf '%s' "$payload" > "$tmp_payload"

            status="$(
              curl -sS \
                --http1.1 \
                -H "Expect:" \
                -H "Authorization: Bearer ${YT_KOTLIN_SUPPORT_TOKEN}" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                --data-binary @"$tmp_payload" \
                -o "$tmp_resp" \
                -w "%{http_code}" \
                "${YT_BASE_URL}/api/issues?fields=idReadable,id,summary"
            )"

            issue_id="$(jq -r '.idReadable // .id // empty' < "$tmp_resp")"
            issue_summary="$(jq -r '.summary // empty' < "$tmp_resp")"

            if [ -n "$issue_id" ]; then
              echo "Created: $issue_id — $issue_summary"
            else
              echo "Unexpected response:"
              cat "$tmp_resp"
            fi

            rm -f "$tmp_payload" "$tmp_resp"
          done
